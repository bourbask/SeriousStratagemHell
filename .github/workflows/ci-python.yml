name: CI (Python)

on:
  push:
    branches: [python]
  pull_request:
    branches: [python]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff pyright

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (pyright)
        run: pyright .
