name: CI (Go)

on:
  push:
    branches: [go]
  pull_request:
    branches: [go]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build
        run: go build ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v6

      - name: Test
        run: go test ./...
